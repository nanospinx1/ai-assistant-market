services:
  - type: web
    name: ai-assistant-market
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: AUTH_SECRET
        generateValue: true
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_API_KEY
        sync: false
      - key: LLM_API_BASE
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
